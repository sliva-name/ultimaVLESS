name: Release macOS

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Xray assets
        run: npm run prepare:xray:mac

      - name: Validate app icon files exist
        run: |
          required_icons=("resources/bin/logo.icns" "resources/bin/logo-256x256.png")
          for icon_path in "${required_icons[@]}"; do
            if [ ! -f "$icon_path" ]; then
              echo "Missing required icon asset in repository: $icon_path"
              exit 1
            fi
          done

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build macOS artifacts
        run: |
          npm run build:electron
          npx electron-builder --mac dmg zip --x64 --arm64 --publish never

      - name: Build SHA256 checksums
        run: |
          mapfile -t files < <(find release -type f \( -name "*.dmg" -o -name "*.zip" \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .dmg/.zip artifacts were produced"
            exit 1
          fi
          > release/SHA256SUMS.txt
          for file in "${files[@]}"; do
            hash="$(shasum -a 256 "$file" | awk '{print $1}')"
            echo "$hash  $file" >> release/SHA256SUMS.txt
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/**/*.dmg
            release/**/*.zip
            release/SHA256SUMS.txt
