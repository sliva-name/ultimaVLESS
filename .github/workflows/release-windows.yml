name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify CI gates
        run: npm run verify:ci

      - name: Verify Windows release config
        run: npm run verify:release:win

      - name: Prepare resources/bin directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "resources/bin" -Force | Out-Null

      - name: Download Xray core assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "User-Agent" = "ultima-vless-release"
          }
          if ($env:GITHUB_TOKEN) {
            $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN"
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/XTLS/Xray-core/releases/latest" -Headers $headers
          $zipAsset = $release.assets | Where-Object { $_.name -eq "Xray-windows-64.zip" } | Select-Object -First 1
          if (-not $zipAsset) {
            throw "Could not find Xray-windows-64.zip in latest Xray-core release"
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "xray.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "xray"
          Invoke-WebRequest -Uri $zipAsset.browser_download_url -OutFile $zipPath -Headers $headers
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $required = @("xray.exe", "geoip.dat", "geosite.dat")
          foreach ($file in $required) {
            $source = Join-Path $extractDir $file
            if (-not (Test-Path $source)) {
              throw "Required Xray asset missing after extraction: $file"
            }
            Copy-Item -Path $source -Destination (Join-Path "resources/bin" $file) -Force
          }

          $optional = @("wintun.dll")
          foreach ($file in $optional) {
            $source = Join-Path $extractDir $file
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination (Join-Path "resources/bin" $file) -Force
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate app icon files exist
        shell: pwsh
        run: |
          $requiredIcons = @("resources/bin/logo.ico", "resources/bin/logo-256x256.png")
          foreach ($iconPath in $requiredIcons) {
            if (-not (Test-Path $iconPath)) {
              throw "Missing required icon asset in repository: $iconPath"
            }
          }

      - name: Validate tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Build Windows artifacts
        shell: pwsh
        run: |
          npm run build:electron
          npx electron-builder --win nsis portable --x64 --publish never

      - name: Build SHA256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "release" -Recurse -File -Include *.exe
          if (-not $files) {
            throw "No .exe artifacts were produced"
          }
          $output = @()
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            $relative = Resolve-Path -Relative -Path $file.FullName
            $output += "$hash  $relative"
          }
          $output | Set-Content -Path "release/SHA256SUMS-windows.txt" -Encoding utf8

      - name: Wait for GitHub Release to exist
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          for ($attempt = 1; $attempt -le 24; $attempt++) {
            try {
              gh release view $tag | Out-Null
              Write-Host "Release for $tag is available."
              exit 0
            } catch {
              Start-Sleep -Seconds 5
            }
          }
          throw "GitHub Release for $tag was not created in time."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/UltimaVLESS-Setup-*.exe
            release/**/UltimaVLESS-Portable-*.exe
            release/SHA256SUMS-windows.txt
